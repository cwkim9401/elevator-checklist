<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>승강기 체크리스트 결과</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #f4f4f0;
    min-height: 100vh;
    padding: 40px 16px;
    color: #1a1a1a;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
    margin-bottom: 6px;
  }

  .header p {
    font-size: 13px;
    color: #888;
  }

  .meta-card {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e8e8e4;
    padding: 20px 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .meta-item label {
    font-size: 11px;
    color: #888;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    display: block;
    margin-bottom: 4px;
  }

  .meta-item span {
    font-size: 14px;
    font-weight: 500;
    color: #1a1a1a;
  }

  .summary-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .summary-card {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e8e8e4;
    padding: 18px;
    text-align: center;
  }

  .summary-card .num {
    font-size: 32px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 6px;
  }

  .summary-card .lbl {
    font-size: 12px;
    color: #888;
  }

  .ok-num { color: #2d7a3a; }
  .bad-num { color: #c0392b; }
  .total-num { color: #1a1a1a; }

  .table-card {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e8e8e4;
    overflow: hidden;
    margin-bottom: 20px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    background: #f8f8f5;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.4px;
    color: #555;
    padding: 12px 14px;
    text-align: left;
    border-bottom: 1px solid #e8e8e4;
  }

  thead th:last-child { text-align: center; }

  tbody tr { border-bottom: 1px solid #f0f0ec; }
  tbody tr:last-child { border-bottom: none; }

  tbody td {
    padding: 14px;
    vertical-align: middle;
    color: #1a1a1a;
    line-height: 1.5;
  }

  .cat-cell {
    font-weight: 600;
    font-size: 12px;
    white-space: nowrap;
    color: #333;
    width: 100px;
  }

  .desc-cell {
    color: #444;
    font-size: 12px;
    line-height: 1.6;
  }

  .law-cell {
    font-size: 11px;
    color: #888;
    white-space: nowrap;
    text-align: center;
  }

  .fine-cell {
    font-size: 11px;
    color: #888;
    line-height: 1.5;
    min-width: 110px;
  }

  .status-cell {
    text-align: center;
    width: 70px;
  }

  .badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .badge-ok {
    background: #e8f5ea;
    color: #2d7a3a;
  }

  .badge-bad {
    background: #fdecea;
    color: #c0392b;
  }

  .badge-na {
    background: #f0f0ee;
    color: #aaa;
  }

  .opinion-card {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e8e8e4;
    padding: 20px 24px;
    margin-bottom: 24px;
  }

  .opinion-card h3 {
    font-size: 12px;
    font-weight: 600;
    color: #888;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .opinion-card p {
    font-size: 13px;
    color: #333;
    line-height: 1.7;
    min-height: 40px;
  }

  .print-btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: #1a1a1a;
    color: #fff;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: background 0.2s;
  }

  .print-btn:hover { background: #333; }

  .loading {
    text-align: center;
    padding: 80px 20px;
    color: #aaa;
    font-size: 14px;
  }

  .loading .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid #e8e8e4;
    border-top-color: #1a1a1a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #result { display: none; }

  @media print {
    body { background: #fff; padding: 16px; }
    .print-btn { display: none; }
    .table-card, .meta-card, .summary-card, .opinion-card {
      border: 1px solid #ccc !important;
      box-shadow: none !important;
    }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>승강기 관리주체 법정 의무사항 확인 체크리스트</h1>
    <p>설문 제출 즉시 결과가 표시됩니다</p>
  </div>

  <!-- 로딩 -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>결과를 불러오는 중입니다...</p>
  </div>

  <!-- 결과 -->
  <div id="result">
    <div class="meta-card">
      <div class="meta-item">
        <label>건물명</label>
        <span id="m-building">-</span>
      </div>
      <div class="meta-item">
        <label>승강기번호</label>
        <span id="m-elevnum">-</span>
      </div>
      <div class="meta-item">
        <label>점검일</label>
        <span id="m-date">-</span>
      </div>
      <div class="meta-item">
        <label>확인자</label>
        <span id="m-checker">-</span>
      </div>
    </div>

    <div class="summary-row">
      <div class="summary-card">
        <div class="num ok-num" id="s-ok">0</div>
        <div class="lbl">양호</div>
      </div>
      <div class="summary-card">
        <div class="num bad-num" id="s-bad">0</div>
        <div class="lbl">미흡</div>
      </div>
      <div class="summary-card">
        <div class="num total-num">5</div>
        <div class="lbl">전체 항목</div>
      </div>
    </div>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>구분</th>
            <th>확인 항목</th>
            <th style="text-align:center">법적근거</th>
            <th>과태료 등</th>
            <th style="text-align:center">결과</th>
          </tr>
        </thead>
        <tbody id="result-tbody"></tbody>
      </table>
    </div>

    <div class="opinion-card">
      <h3>종합의견</h3>
      <p id="opinion-text">-</p>
    </div>

    <button class="print-btn" onclick="window.print()">인쇄 / PDF 저장</button>
  </div>

</div>

<script>
/* ──────────────────────────────────────────────
   체크리스트 항목 정의
   Tally 질문 라벨과 매핑할 key 값을 설정하세요.
   key 값은 Tally 질문의 label 과 동일하게 작성하면 됩니다.
────────────────────────────────────────────── */
const ITEMS = [
  {
    key: '안전관리자선임',
    cat: '안전관리자 선임',
    desc: '승강기 안전관리자를 선임하여 승강기를 관리하고 있는가? (선임·변경 시 30일 이내 통보)',
    law: '승강기법 제29조',
    fine: '최대 100만원'
  },
  {
    key: '안전관리자교육',
    cat: '안전관리자 교육',
    desc: '승강기 안전관리자는 선임된 후 3개월 이내, 교육을 받았는가? (교육은 수료한 날부터 3년마다 갱신 필요)',
    law: '승강기법 제29조',
    fine: '최대 200만원'
  },
  {
    key: '승강기책임보험',
    cat: '승강기 책임보험',
    desc: '관리주체는 승강기 책임보험에 가입하였는가? (사고 시 손해 배상 보장을 위한 보험 가입 필요)',
    law: '승강기법 제30조',
    fine: '최대 400만원'
  },
  {
    key: '승강기자체점검',
    cat: '승강기 자체점검',
    desc: '승강기 자체 점검을 월 1회 이상 실시하고, 결과를 정하는 기간 이내에 승강기안전종합정보망에 입력하였는가? (점검 후 10일 이내)',
    law: '승강기법 제31조',
    fine: '미실시·거짓 입력 최대 400만원\n기한 경과 최대 200만원'
  },
  {
    key: '사고고장신고',
    cat: '승강기 사고·고장 신고',
    desc: '관리하는 승강기 사고·고장이 발생한 경우 한국승강기안전공단에 통보하고 있는가?',
    law: '승강기법 제48조',
    fine: '지연(1개월 초과)·거짓 통보 최대 400만원'
  }
];

/* ──────────────────────────────────────────────
   URL 파라미터에서 결과를 파싱합니다.
   Tally hidden field 로 각 항목 결과를 URL에 담아 전달합니다.
   예: ?건물명=OO빌딩&승강기번호=A-001&안전관리자선임=양호&...
────────────────────────────────────────────── */
function parseParams() {
  const params = new URLSearchParams(window.location.search);
  return {
    building: params.get('건물명') || params.get('building') || '',
    elevnum:  params.get('승강기번호') || params.get('elevnum') || '',
    date:     params.get('점검일') || params.get('date') || '',
    checker:  params.get('확인자') || params.get('checker') || '',
    opinion:  params.get('종합의견') || params.get('opinion') || '',
    items: ITEMS.map(item => ({
      ...item,
      status: params.get(item.key) || null
    }))
  };
}

/* ──────────────────────────────────────────────
   결과 렌더링
────────────────────────────────────────────── */
function render(data) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('result').style.display = 'block';

  document.getElementById('m-building').textContent = data.building || '-';
  document.getElementById('m-elevnum').textContent  = data.elevnum  || '-';
  document.getElementById('m-date').textContent     = data.date     || '-';
  document.getElementById('m-checker').textContent  = data.checker  || '-';
  document.getElementById('opinion-text').textContent = data.opinion || '-';

  let okCount = 0, badCount = 0;
  const tbody = document.getElementById('result-tbody');
  tbody.innerHTML = '';

  data.items.forEach(item => {
    const isOk  = item.status === '양호';
    const isBad = item.status === '미흡';
    if (isOk)  okCount++;
    if (isBad) badCount++;

    const badge = isOk
      ? '<span class="badge badge-ok">양호</span>'
      : isBad
        ? '<span class="badge badge-bad">미흡</span>'
        : '<span class="badge badge-na">미입력</span>';

    tbody.innerHTML += `
      <tr>
        <td class="cat-cell">${item.cat}</td>
        <td class="desc-cell">${item.desc}</td>
        <td class="law-cell">${item.law}</td>
        <td class="fine-cell">${item.fine.replace(/\n/g,'<br>')}</td>
        <td class="status-cell">${badge}</td>
      </tr>`;
  });

  document.getElementById('s-ok').textContent  = okCount;
  document.getElementById('s-bad').textContent = badCount;
}

/* ──────────────────────────────────────────────
   메인 실행
────────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  const data = parseParams();
  // URL 파라미터가 없으면 데모 데이터로 표시
  const hasData = window.location.search.length > 1;
  if (!hasData) {
    // 데모 모드
    data.building = '샘플빌딩';
    data.elevnum  = 'A-001';
    data.date     = new Date().toLocaleDateString('ko-KR');
    data.checker  = '홍길동';
    data.opinion  = '전반적으로 양호하나 자체점검 정보망 입력 기한 준수 필요';
    data.items[0].status = '양호';
    data.items[1].status = '양호';
    data.items[2].status = '양호';
    data.items[3].status = '미흡';
    data.items[4].status = '양호';
  }
  setTimeout(() => render(data), hasData ? 300 : 600);
});
</script>
</body>
</html>
