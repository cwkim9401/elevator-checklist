<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>승강기 체크리스트 결과</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #f4f4f0; min-height: 100vh; padding: 28px 16px 48px; color: #1a1a1a; }
  .container { max-width: 680px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 24px; }
  .header h1 { font-size: 17px; font-weight: 700; line-height: 1.5; margin-bottom: 4px; }
  .header p { font-size: 12px; color: #999; }
  .meta-card { background: #fff; border-radius: 14px; border: 1px solid #e8e8e4; padding: 18px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .meta-item label { font-size: 10px; color: #aaa; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; display: block; margin-bottom: 3px; }
  .meta-item span { font-size: 14px; font-weight: 600; color: #1a1a1a; }
  .summary-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 20px; }
  .summary-card { background: #fff; border-radius: 14px; border: 1px solid #e8e8e4; padding: 16px 10px; text-align: center; }
  .summary-card .num { font-size: 30px; font-weight: 700; line-height: 1; margin-bottom: 5px; }
  .summary-card .lbl { font-size: 11px; color: #aaa; }
  .ok-num { color: #2a7a3b; } .bad-num { color: #c0392b; }
  .section-title { font-size: 11px; font-weight: 700; color: #aaa; letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 10px; padding-left: 2px; }
  .check-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .check-card { background: #fff; border-radius: 14px; border: 1px solid #e8e8e4; padding: 16px 18px; display: flex; flex-direction: column; gap: 10px; }
  .check-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .check-card-left { flex: 1; }
  .check-cat { font-size: 13px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
  .check-desc { font-size: 12px; color: #666; line-height: 1.6; }
  .badge { flex-shrink: 0; display: inline-block; padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; white-space: nowrap; }
  .badge-ok { background: #e8f5ea; color: #2a7a3b; }
  .badge-bad { background: #fdecea; color: #c0392b; }
  .badge-na { background: #f2f2f0; color: #bbb; }
  .check-card-bottom { border-top: 1px solid #f0f0ec; padding-top: 10px; display: flex; gap: 16px; }
  .meta-chip { display: flex; flex-direction: column; gap: 2px; }
  .meta-chip span:first-child { font-size: 10px; color: #bbb; font-weight: 700; letter-spacing: 0.4px; text-transform: uppercase; }
  .meta-chip span:last-child { font-size: 11px; color: #888; line-height: 1.5; }
  @media (min-width: 600px) { .check-list { display: none; } .table-card { display: block; } }
  @media (max-width: 599px) { .check-list { display: flex; } .table-card { display: none; } }
  .table-card { background: #fff; border-radius: 14px; border: 1px solid #e8e8e4; overflow: hidden; margin-bottom: 20px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: #f8f8f5; font-weight: 700; font-size: 11px; letter-spacing: 0.4px; color: #666; padding: 12px 14px; text-align: left; border-bottom: 1px solid #e8e8e4; }
  thead th:last-child { text-align: center; }
  tbody tr { border-bottom: 1px solid #f0f0ec; }
  tbody tr:last-child { border-bottom: none; }
  tbody td { padding: 14px; vertical-align: top; color: #1a1a1a; line-height: 1.5; }
  .cat-cell { font-weight: 700; font-size: 12px; white-space: nowrap; width: 110px; }
  .desc-cell { font-size: 12px; color: #555; line-height: 1.6; }
  .law-cell { font-size: 11px; color: #999; white-space: nowrap; text-align: center; width: 90px; }
  .fine-cell { font-size: 11px; color: #999; line-height: 1.5; min-width: 120px; }
  .status-cell { text-align: center; width: 70px; }
  .opinion-card { background: #fff; border-radius: 14px; border: 1px solid #e8e8e4; padding: 18px 20px; margin-bottom: 20px; }
  .opinion-card h3 { font-size: 10px; font-weight: 700; color: #aaa; letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 8px; }
  .opinion-card p { font-size: 13px; color: #333; line-height: 1.7; min-height: 36px; }

  /* 버튼 */
  .btn-group { display: flex; flex-direction: column; gap: 10px; }
  .btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 15px; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; letter-spacing: 0.2px; transition: opacity 0.15s; }
  .btn:active { opacity: 0.7; }
  .btn svg { width: 18px; height: 18px; flex-shrink: 0; }
  .btn-kakao { background: #fee500; color: #1a1a1a; }
  .btn-sms   { background: #34c759; color: #fff; }
  .btn-url   { background: #1a1a1a; color: #fff; }
  .btn-pdf   { background: #e74c3c; color: #fff; }
  .btn-print { background: #fff; color: #555; border: 1.5px solid #e0e0dc; }

  /* 토스트 */
  .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(16px); background: #1a1a1a; color: #fff; font-size: 13px; font-weight: 500; padding: 12px 24px; border-radius: 100px; opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap; z-index: 999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .loading { text-align: center; padding: 80px 20px; color: #bbb; font-size: 14px; }
  .spinner { width: 28px; height: 28px; border: 2px solid #e8e8e4; border-top-color: #1a1a1a; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #result { display: none; }

  @media print {
    body { background: #fff; padding: 16px; }
    .btn-group, .toast { display: none; }
    .check-list { display: none !important; }
    .table-card { display: block !important; }
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>승강기 관리주체 법정 의무사항<br>확인 체크리스트</h1>
    <p>설문 제출 즉시 결과가 표시됩니다</p>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>결과를 불러오는 중...</p>
  </div>

  <div id="result">
    <div class="meta-card">
      <div class="meta-item"><label>건물명</label><span id="m-building">-</span></div>
      <div class="meta-item"><label>승강기번호</label><span id="m-elevnum">-</span></div>
      <div class="meta-item"><label>점검일</label><span id="m-date">-</span></div>
      <div class="meta-item"><label>확인자</label><span id="m-checker">-</span></div>
    </div>

    <div class="summary-row">
      <div class="summary-card"><div class="num ok-num" id="s-ok">0</div><div class="lbl">양호</div></div>
      <div class="summary-card"><div class="num bad-num" id="s-bad">0</div><div class="lbl">미흡</div></div>
      <div class="summary-card"><div class="num" style="color:#1a1a1a">5</div><div class="lbl">전체 항목</div></div>
    </div>

    <div class="section-title">확인 항목</div>
    <div class="check-list" id="card-list"></div>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>구분</th><th>확인 항목</th>
            <th style="text-align:center">법적근거</th>
            <th>과태료 등</th>
            <th style="text-align:center">결과</th>
          </tr>
        </thead>
        <tbody id="result-tbody"></tbody>
      </table>
    </div>

    <div class="opinion-card">
      <h3>종합의견</h3>
      <p id="opinion-text">-</p>
    </div>

    <div class="btn-group">
      <!-- 카카오톡/문자: 기기 공유 시트 호출 -->
      <button class="btn btn-kakao" onclick="shareResult()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/>
          <polyline points="16 6 12 2 8 6"/>
          <line x1="12" y1="2" x2="12" y2="15"/>
        </svg>
        카카오톡으로 결과 보내기
      </button>

      <!-- 문자(SMS) 직접 보내기 -->
      <button class="btn btn-sms" onclick="sendSMS()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
        문자 메시지로 결과 보내기
      </button>

      <!-- URL 복사 -->
      <button class="btn btn-url" onclick="copyUrl()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
        결과 URL 복사하기
      </button>

      <!-- PDF 다운로드 -->
      <button class="btn btn-pdf" onclick="downloadPDF()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="18" x2="12" y2="12"/>
          <polyline points="9 15 12 18 15 15"/>
        </svg>
        PDF 다운로드
      </button>

      <!-- 인쇄 -->
      <button class="btn btn-print" onclick="window.print()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 6 2 18 2 18 9"/>
          <path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/>
          <rect x="6" y="14" width="12" height="8"/>
        </svg>
        인쇄하기
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ITEMS = [
  { key:'q1', legacyKey:'안전관리자선임', cat:'안전관리자 선임',       desc:'승강기 안전관리자를 선임하여 승강기를 관리하고 있는가? (선임·변경 시 30일 이내 통보)',                                              law:'승강기법 제29조', fine:'최대 100만원' },
  { key:'q2', legacyKey:'안전관리자교육', cat:'안전관리자 교육',       desc:'승강기 안전관리자는 선임된 후 3개월 이내, 교육을 받았는가? (교육은 수료한 날부터 3년마다 갱신 필요)',                              law:'승강기법 제29조', fine:'최대 200만원' },
  { key:'q3', legacyKey:'승강기책임보험', cat:'승강기 책임보험',       desc:'관리주체는 승강기 책임보험에 가입하였는가? (사고 시 손해 배상 보장을 위한 보험 가입 필요)',                                        law:'승강기법 제30조', fine:'최대 400만원' },
  { key:'q4', legacyKey:'승강기자체점검', cat:'승강기 자체점검',       desc:'승강기 자체 점검을 월 1회 이상 실시하고, 결과를 정하는 기간 이내에 승강기안전종합정보망에 입력하였는가? (점검 후 10일 이내)',        law:'승강기법 제31조', fine:'미실시·거짓 입력 최대 400만원\n기한 경과 최대 200만원' },
  { key:'q5', legacyKey:'사고고장신고',   cat:'승강기 사고·고장 신고', desc:'관리하는 승강기 사고·고장이 발생한 경우 한국승강기안전공단에 통보하고 있는가? (중대한 사고·고장 발생 시 지체 없이 신고)',          law:'승강기법 제48조', fine:'지연(1개월 초과)·거짓 통보 최대 400만원' }
];

function badgeHtml(s) {
  if (s==='양호') return '<span class="badge badge-ok">양호</span>';
  if (s==='미흡') return '<span class="badge badge-bad">미흡</span>';
  return '<span class="badge badge-na">미입력</span>';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// 📤 공유 버튼 — 기기 공유 시트(카카오톡, 문자, 메일 등) 호출
function shareResult() {
  const url      = buildShortUrl();
  const building = document.getElementById('m-building').textContent;
  const date     = document.getElementById('m-date').textContent;
  const ok       = document.getElementById('s-ok').textContent;
  const bad      = document.getElementById('s-bad').textContent;
  const shareText = `[승강기 체크리스트 결과]\n건물명: ${building}\n점검일: ${date}\n양호 ${ok}건 / 미흡 ${bad}건`;

  if (navigator.share) {
    navigator.share({ title: '승강기 체크리스트 결과', text: shareText, url })
      .catch(() => {});
  } else {
    copyToClipboard(shareText + '\n\n결과 확인:\n' + url);
    showToast('내용이 복사되었습니다. 붙여넣기 해서 공유하세요.');
  }
}

// 📱 문자(SMS) 직접 보내기 — sms: URI 스킴 사용
function sendSMS() {
  const url      = buildShortUrl();
  const building = document.getElementById('m-building').textContent;
  const date     = document.getElementById('m-date').textContent;
  const ok       = document.getElementById('s-ok').textContent;
  const bad      = document.getElementById('s-bad').textContent;
  const smsBody  = `[승강기 체크리스트 결과]\n건물명: ${building}\n점검일: ${date}\n양호 ${ok}건 / 미흡 ${bad}건\n\n결과 확인:\n${url}`;

  // iOS는 sms:&body=, Android는 sms:?body= 형식
  // sms:?&body= 형식은 양쪽 모두 호환
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const separator = isIOS ? '&' : '?';
  const smsUrl = `sms:${separator}body=${encodeURIComponent(smsBody)}`;

  window.location.href = smsUrl;
}

// 🔗 URL만 복사
function copyUrl() {
  copyToClipboard(buildShortUrl());
  showToast('결과 URL이 복사되었습니다!');
}

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const el = document.createElement('textarea');
  el.value = text;
  el.style.cssText = 'position:fixed;top:-9999px;opacity:0';
  document.body.appendChild(el);
  el.select();
  document.execCommand('copy');
  document.body.removeChild(el);
}

// 📄 PDF 다운로드 — html2canvas + jsPDF
async function downloadPDF() {
  const btn = event.currentTarget;
  const originalText = btn.innerHTML;
  btn.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4m0 12v4m-7.07-3.93l2.83-2.83m8.48-8.48l2.83-2.83M2 12h4m12 0h4m-3.93 7.07l-2.83-2.83M6.34 6.34L3.51 3.51"/></svg> PDF 생성 중...';
  btn.disabled = true;

  try {
    const container = document.getElementById('result');
    const btnGroup = document.querySelector('.btn-group');

    // 버튼 그룹 임시 숨김
    btnGroup.style.display = 'none';

    // 모바일 카드 레이아웃 대신 테이블 보이기
    const cardList = document.getElementById('card-list');
    const tableCard = document.querySelector('.table-card');
    const origCardDisplay = cardList.style.display;
    const origTableDisplay = tableCard.style.display;
    cardList.style.display = 'none';
    tableCard.style.display = 'block';

    const canvas = await html2canvas(container, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#f4f4f0',
      logging: false
    });

    // 원래 상태 복원
    btnGroup.style.display = '';
    cardList.style.display = origCardDisplay;
    tableCard.style.display = origTableDisplay;

    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const imgWidth = 190; // A4 여백 제외 폭 (mm)
    const pageHeight = 277; // A4 여백 제외 높이 (mm)
    const imgHeight = (canvas.height * imgWidth) / canvas.width;

    const pdf = new jsPDF('p', 'mm', 'a4');
    let heightLeft = imgHeight;
    let position = 10; // 상단 여백

    pdf.addImage(imgData, 'PNG', 10, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;

    while (heightLeft > 0) {
      position = heightLeft - imgHeight + 10;
      pdf.addPage();
      pdf.addImage(imgData, 'PNG', 10, position, imgWidth, imgHeight);
      heightLeft -= pageHeight;
    }

    const building = document.getElementById('m-building').textContent || '결과';
    const date = document.getElementById('m-date').textContent || '';
    pdf.save(`승강기_체크리스트_${building}_${date}.pdf`);
    showToast('PDF가 다운로드되었습니다!');
  } catch (err) {
    console.error('PDF 생성 오류:', err);
    showToast('PDF 생성에 실패했습니다. 인쇄 기능을 이용해주세요.');
  } finally {
    btn.innerHTML = originalText;
    btn.disabled = false;
  }
}

function render(data) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('result').style.display  = 'block';
  document.getElementById('m-building').textContent   = data.building || '-';
  document.getElementById('m-elevnum').textContent    = data.elevnum  || '-';
  document.getElementById('m-date').textContent       = data.date     || '-';
  document.getElementById('m-checker').textContent    = data.checker  || '-';
  document.getElementById('opinion-text').textContent = data.opinion  || '-';

  let ok = 0, bad = 0;
  const cardList = document.getElementById('card-list');
  const tbody    = document.getElementById('result-tbody');
  cardList.innerHTML = tbody.innerHTML = '';

  data.items.forEach(item => {
    if (item.status==='양호') ok++;
    if (item.status==='미흡') bad++;

    const card = document.createElement('div');
    card.className = 'check-card';
    card.innerHTML = `
      <div class="check-card-top">
        <div class="check-card-left">
          <div class="check-cat">${item.cat}</div>
          <div class="check-desc">${item.desc}</div>
        </div>
        ${badgeHtml(item.status)}
      </div>
      <div class="check-card-bottom">
        <div class="meta-chip"><span>법적근거</span><span>${item.law}</span></div>
        <div class="meta-chip"><span>과태료</span><span>${item.fine.replace(/\n/g,'<br>')}</span></div>
      </div>`;
    cardList.appendChild(card);

    tbody.innerHTML += `
      <tr>
        <td class="cat-cell">${item.cat}</td>
        <td class="desc-cell">${item.desc}</td>
        <td class="law-cell">${item.law}</td>
        <td class="fine-cell">${item.fine.replace(/\n/g,'<br>')}</td>
        <td class="status-cell">${badgeHtml(item.status)}</td>
      </tr>`;
  });

  document.getElementById('s-ok').textContent  = ok;
  document.getElementById('s-bad').textContent = bad;
}

// 짧은 URL 생성 함수 (공유용)
function buildShortUrl() {
  const base = window.location.origin + window.location.pathname;
  const p = new URLSearchParams();
  const building = document.getElementById('m-building').textContent;
  const elevnum  = document.getElementById('m-elevnum').textContent;
  const date     = document.getElementById('m-date').textContent;
  const checker  = document.getElementById('m-checker').textContent;
  const opinion  = document.getElementById('opinion-text').textContent;

  if (building && building !== '-') p.set('b', building);
  if (elevnum && elevnum !== '-')   p.set('e', elevnum);
  if (date && date !== '-')         p.set('d', date);
  if (checker && checker !== '-')   p.set('c', checker);
  if (opinion && opinion !== '-')   p.set('o', opinion);

  // 양호=1, 미흡=0 으로 상태를 압축 (예: "11101")
  const params = new URLSearchParams(window.location.search);
  const statusStr = ITEMS.map(item => {
    const val = params.get(item.key) || params.get(item.legacyKey) || '';
    return val === '양호' ? '1' : val === '미흡' ? '0' : '';
  }).join('');
  if (statusStr) p.set('s', statusStr);

  return base + '?' + p.toString();
}

window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);

  // 짧은 키 's' 파라미터로 상태 복원 (예: "11101" → 양호,양호,양호,미흡,양호)
  const statusStr = params.get('s') || '';
  const statusMap = { '1': '양호', '0': '미흡' };

  const data = {
    building: params.get('b') || params.get('건물명')    || '',
    elevnum:  params.get('e') || params.get('승강기번호') || '',
    date:     params.get('d') || params.get('점검일')    || '',
    checker:  params.get('c') || params.get('확인자')    || '',
    opinion:  params.get('o') || params.get('종합의견')  || '',
    items: ITEMS.map((item, i) => ({
      ...item,
      status: params.get(item.key) || params.get(item.legacyKey) || statusMap[statusStr[i]] || null
    }))
  };
  const hasData = window.location.search.length > 1;
  if (!hasData) {
    data.building='샘플빌딩'; data.elevnum='A-001';
    data.date=new Date().toLocaleDateString('ko-KR'); data.checker='홍길동';
    data.opinion='전반적으로 양호하나 자체점검 정보망 입력 기한 준수 필요';
    ['양호','양호','양호','미흡','양호'].forEach((s,i)=>data.items[i].status=s);
  }
  setTimeout(() => render(data), hasData ? 300 : 500);
});
</script>
